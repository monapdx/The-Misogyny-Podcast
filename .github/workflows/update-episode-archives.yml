name: Update episode archives

on:
  push:
    paths:
      - "episodes/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-episode-archives
  cancel-in-progress: true

jobs:
  update-archives:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Regenerate README and homepage archives
        run: python scripts/update_episode_archives.py

      - name: Commit updated archives
        run: |
          if git diff --quiet -- README.md index.html; then
            echo "Episode archives are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html
          git commit -m "docs: update episode archives"
          git push
