name: Update episode table

on:
  push:
    paths:
      - "episodes/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-episode-table
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Regenerate episode table
        run: python scripts/update_episode_table.py

      - name: Commit updated README
        run: |
          if git diff --quiet -- README.md; then
            echo "README episode table is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update episode table"
          git push

