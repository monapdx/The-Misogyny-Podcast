name: "Finally, Someone Said It"
description: "Send Derek the praise he believes has been criminally withheld from him."
title: "[SUPPORTER] "
labels:
  - "call-in: supporter"
body:
  - type: markdown
    attributes:
      value: |
        Welcome, free thinker. This is a fictional, participatory satire project. Your fictional bad opinions are welcome; real-world harassment is not.

  - type: input
    id: caller-name
    attributes:
      label: Name, handle, or suspiciously new account
      placeholder: "DefinitelyNotDerek"
    validations:
      required: true

  - type: textarea
    id: praise
    attributes:
      label: Your message for Derek
      placeholder: "Finally, someone brave enough to say..."
    validations:
      required: true

  - type: textarea
    id: testimony
    attributes:
      label: How has the show changed your life?
      description: Optional. Positive outcomes are not required—or particularly expected.

  - type: checkboxes
    id: permission
    attributes:
      label: Permission
      options:
        - label: Derek may read this fictional message on the show and accept far too much credit for it.
          required: true

